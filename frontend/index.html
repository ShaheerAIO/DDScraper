<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoorDash Menu Scraper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>DoorDash Menu Scraper</h1>
        <p class="subtitle">Paste a DoorDash store URL to export its menu as an Excel file.</p>

        <form id="scrape-form">
            <input
                type="url"
                id="url-input"
                placeholder="https://www.doordash.com/store/..."
                required
            />
            <button type="submit" id="submit-btn">Scrape Menu</button>
        </form>

        <div id="status" class="status hidden"></div>
        <div id="error" class="error hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
